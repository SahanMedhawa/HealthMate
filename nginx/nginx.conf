            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://ai-service:5007/api/ai;
        }

        # Payment Service
        location /api/payment {
            if ($request_method = 'OPTIONS') {
