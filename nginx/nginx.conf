            proxy_pass http://appointment-service:5003/api/doctor/queue;
        }

        # Admin Service
        location /api/admin {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://admin-service:5004/api/admin;
        }

        # Notification Service REST
        location /api/notify {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
