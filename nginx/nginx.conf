            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://doctor-service:5002/api/diagnosis;
        }

        # Appointment Service
        location /api/appointment {
            if ($request_method = 'OPTIONS') {
