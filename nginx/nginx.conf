events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=on;
    resolver_timeout 5s;

    # ── Shared CORS map ──────────────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "http://localhost:5173" "http://localhost:5173";
        "http://localhost:5174" "http://localhost:5174";
        "http://localhost:3000" "http://localhost:3000";
    }

    server {
        listen 8080;

        # Common proxy headers (inherited by all locations)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Origin $http_origin;

        # Hide backend CORS headers to prevent duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # ── Preflight handler ────────────────────────────────────────
        # Nginx "if" inside location is safe for return/rewrite only
        # We handle OPTIONS in a named location to avoid "if is evil"

        # Patient Service
        location /api/patient {
            set $patient_upstream http://patient-service:5001;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $patient_upstream;
        }

        # Doctor Service
        location /api/doctors {
            set $doctor_upstream http://doctor-service:5002;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $doctor_upstream;
        }

        # Diagnosis Service (handled by Doctor Service)
        location /api/diagnosis {
            set $doctor_upstream http://doctor-service:5002;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $doctor_upstream;
        }

        # Appointment Service
        location /api/appointment {
            set $appointment_upstream http://appointment-service:5003;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $appointment_upstream;
        }

        location /api/doctor/queue {
            set $appointment_upstream http://appointment-service:5003;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $appointment_upstream;
        }

        # Admin Service
        location /api/admin {
            set $admin_upstream http://admin-service:5004;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $admin_upstream;
        }

        # Notification Service REST
        location /api/notify {
            set $notification_upstream http://notification-service:5006;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $notification_upstream;
        }

        # Socket.io support (Notification Service)
        location /socket.io {
            set $notification_upstream http://notification-service:5006;
            proxy_pass $notification_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_cache_bypass $http_upgrade;
        }

        # Telemedicine Service
        location /api/telemedicine {
            set $telemedicine_upstream http://telemedicine-service:5005;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $telemedicine_upstream;
        }

        # AI Service
        location /api/ai {
            set $ai_upstream http://ai-service:5007;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $ai_upstream;
        }

        # Payment Service
        location /api/payment {
            set $payment_upstream http://payment-service:5008;
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass $payment_upstream;
        }
    }
}
