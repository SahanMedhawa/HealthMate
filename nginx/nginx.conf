events {
    worker_connections 1024;
}

http {
    # ── Shared CORS map ──────────────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "http://localhost:5173" "http://localhost:5173";
        "http://localhost:5174" "http://localhost:5174";
        "http://localhost:3000" "http://localhost:3000";
    }

    server {
        listen 8080;

        # Common proxy headers (inherited by all locations)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Origin $http_origin;

        # Hide backend CORS headers to prevent duplicates
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # ── Preflight handler ────────────────────────────────────────
        # Nginx "if" inside location is safe for return/rewrite only
        # We handle OPTIONS in a named location to avoid "if is evil"

        # Patient Service
        location /api/patient {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://patient-service:5001/api/patient;
        }

        # Doctor Service
        location /api/doctors {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400;
                add_header 'Content-Length' 0;
                return 204;
            }
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            proxy_pass http://doctor-service:5002/api/doctors;
        }

        # Diagnosis Service (handled by Doctor Service)
        location /api/diagnosis {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PATCH, PUT, DELETE' always;
                add_header 'Access-Control-Allow-Headers' 'X-Requested-With,Content-Type,Authorization,Origin,Accept' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
