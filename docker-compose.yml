    volumes:
      - ./microservices/payment-service:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - healthmate-network

  nginx-gateway:
    image: nginx:alpine
    container_name: healthmate-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      patient-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - healthmate-network

networks:
  healthmate-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.20.0.0/16"
        - subnet: "fd00:db8:1::/64"
