services:
  mongodb:
    image: mongo:7
    container_name: healthmate-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: healthmate
    healthcheck:
      test:
        - CMD-SHELL
        - 'mongosh --quiet --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 1)"'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - healthmate-network

  patient-service:
    build: ./microservices/patient-service
    container_name: healthmate-patient
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./microservices/patient-service/.env
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'node -e "const net=require(\"net\");const s=net.createConnection({host:\"127.0.0.1\",port:5001},()=>{s.end();process.exit(0)});s.on(\"error\",()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ./microservices/patient-service:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - healthmate-network

  doctor-service:
    build: ./microservices/doctor-service
    container_name: healthmate-doctor
    restart: unless-stopped
    ports:
      - "5002:5002"
    env_file:
      - ./microservices/doctor-service/.env
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
