  nginx-gateway:
    image: nginx:alpine
    container_name: healthmate-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      patient-service:
        condition: service_healthy
      doctor-service:
        condition: service_healthy
      appointment-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - healthmate-network

volumes:
  mongodb_data:


networks:
  healthmate-network:
    driver: bridge
