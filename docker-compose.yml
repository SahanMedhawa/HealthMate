        - CMD-SHELL
        - 'node -e "const net=require(\"net\");const s=net.createConnection({host:\"127.0.0.1\",port:5003},()=>{s.end();process.exit(0)});s.on(\"error\",()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"'
      interval: 10s
